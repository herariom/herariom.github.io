# Projects

# Nutrition Facts
- project: Nutrition Facts
  url: "https://github.com/herariom/NutritionFacts"
  description: Built website backed by Flask and Python that allows user to search nutrition facts for food products. It uses Tesseract to extract nutritional information from user-uploaded images of nutrition fact panels to store in MySQL database. <img src="test.PNG"> <img src="test2.PNG"> <img src="test3.PNG">


# ImgAnalysis
- project: ImgAnalysis
  url: "https://github.com/herariom/ImgAnalysis"
  description: ImgAnalysis is a proof of concept image recognition library written in pure Java. It uses the depth first search algorithm to find similarly colored fragments in the main image that can be compared with the subject image to detect how similar the two images are. <img src="imganalysis1.PNG">

